services:
  solesonic-llm-api:
    env_file:
      - .env
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: solesonic-llm-api:latest
    container_name: solesonic-llm-api
    network_mode: "host"
    restart: unless-stopped
    environment:
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - SERVER_PORT=8080
    volumes:
      - /var/log/solesonic-llm-api:/var/log/solesonic-llm-api
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: ["gpu"]