services:
  redis:
    image: redis:8.6.0
    container_name: solesonic-redis
    network_mode: "host"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --bind 127.0.0.1
      --protected-mode yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --rename-command FLUSHALL ""
      --rename-command FLUSHDB ""
      --rename-command CONFIG ""
      --rename-command DEBUG ""
      --appendonly yes
    restart: unless-stopped
    user: "999:999"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  redis_data:
    driver: local