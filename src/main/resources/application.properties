spring.config.import=optional:file:.env[.properties]

server.shutdown=immediate

spring.application.name=Solesonic LLM API

server.servlet.context-path=/${BASE_URI}

spring.datasource.username=${POSTGRES_USER}

spring.datasource.url=${DB_URL}
spring.datasource.password=${DB_PASSWORD}

jira.api.uri=https://api.atlassian.com

training.task.enabled=true
confluence.training.task.enabled=true

spring.security.oauth2.resourceserver.jwt.issuer-uri=${ISSUER_URI}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${JWK_SET_URI}

solesonic.llm.token.exchange.client-id=${MCP_CLIENT_ID}
solesonic.llm.token.exchange.client-secret=${MCP_CLIENT_SECRET}
solesonic.llm.token.exchange.endpoint=${TOKEN_ENDPOINT}

spring.ai.vectorstore.pgvector.table-name=vector_store

spring.jackson.deserialization.fail-on-null-for-primitives=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.placeholders.DB_OWNER=${POSTGRES_USER}

cors.allowed.origins=${CORS_ALLOWED_ORIGINS}

spring.ai.mcp.client.name=mcp-client
spring.ai.mcp.client.version=1.0.0
spring.ai.mcp.client.type=ASYNC
spring.ai.mcp.client.initialized=true
spring.ai.mcp.client.root-change-notification=true
spring.ai.mcp.client.annotation-scanner.enabled=true
spring.ai.mcp.client.toolcallback.enabled=true
spring.ai.mcp.client.request-timeout=600s

spring.ai.mcp.client.streamable-http.connections.solesonic.url=${SOLESONIC_MCP_URI}

spring.security.oauth2.client.provider.authserver.issuer-uri=${MCP_ISSUER_URI}

spring.security.oauth2.client.registration.mcp-client.client-id=${MCP_CLIENT_ID}
spring.security.oauth2.client.registration.mcp-client.client-secret=${MCP_CLIENT_SECRET}
spring.security.oauth2.client.registration.mcp-client.authorization-grant-type=client_credentials
spring.security.oauth2.client.registration.mcp-client.provider=authserver

logging.level.io.modelcontextprotocol.client=INFO
logging.level.io.modelcontextprotocol.spec=INFO

solesonic.llm.bot.name=${BOT_NAME:solesonic-llm-api}

solesonic.llm.jira.url.template=https://solesonic-llm-api.atlassian.net/browse/{key}
solesonic.llm.jira.cloud.id.path=${JIRA_CLOUD_ID_PATH}

# Atlassian OAuth configuration
atlassian.oauth.token-uri=${ATLASSIAN_OAUTH_TOKEN_URI}
atlassian.oauth.client-id=${ATLASSIAN_OAUTH_CLIENT_ID}
atlassian.oauth.client-secret=${ATLASSIAN_OAUTH_CLIENT_SECRET}

# Atlassian token storage configuration
atlassian.tokens.cache.enabled=true
atlassian.tokens.cache.ttl-seconds=3300
atlassian.tokens.migration.enabled=false

# Token Broker configuration
atlassian.token.broker.cache.enabled=true
atlassian.token.broker.cache.expiry-skew-seconds=45
atlassian.token.broker.retry.jitter=true
atlassian.token.broker.required-scope=token:mint:jira
atlassian.token.broker.required-audience=token-broker

atlassian.service.account.user.id=${ATLASSIAN_TOKENS_ADMIN_KEY}

encryption.password=${ENCRYPTION_PASSWORD}
encryption.salt=${ENCRYPTION_SALT}

# Redis Streams configuration
spring.data.redis.host=${REDDIS_HOST}
spring.data.redis.password=${REDIS_PASSWORD}
redis.stream.max-length=10000
redis.stream.read-timeout-seconds=5

solesonic.llm.slash-commands.cache.ttl-seconds=3600
solesonic.llm.slash-commands.cache.warmup-on-startup=true


