spring.application.name=solesonic-llm-api

server.address=0.0.0.0
server.port=8080
server.forward-headers-strategy=native

management.endpoints.access.default=none
spring.http.codecs.max-in-memory-size=10MB

logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO
logging.level.reactor.netty.http.client=INFO

logging.level.org.springframework.web.client.RestTemplate=INFO
logging.level.org.springframework.http.client=INFO
logging.level.org.springframework.web.reactive.function.client.ExchangeFunctions=INFO
logging.level.org.apache.http=INFO

logging.level.org.springframework.ai=INFO
logging.level.org.springframework.ai.chat.client.advisor=INFO
logging.level.com.zaxxer.hikari=off
logging.level.com.security.BasicAuthenticationFilter=INFO

logging.level.com.solesonic.security.atlassian=INFO

# suppress inspection "HttpUrlsUsage"
spring.ai.ollama.base-url=http://${OLLAMA_HOST}:11434

# Connection pool settings
spring.datasource.hikari.connection-timeout=200000
spring.datasource.hikari.maximum-pool-size=10

# Connection retry settings
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.connection-test-query=SELECT 1

spring.jpa.hibernate.ddl-auto=none

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false

spring.ai.ollama.chat.model=qwen2.5:32b
spring.ai.ollama.init.pull-model-strategy=when_missing
spring.ai.ollama.chat.options.num-ctx=131072
spring.ai.ollama.chat.options.num-batch=1024

spring.ai.ollama.chat.options.num-thread=24
spring.ai.ollama.chat.options.num-gpu=999
spring.ai.ollama.chat.options.main-gpu=0

spring.ai.ollama.embedding.model=mxbai-embed-large
spring.ai.ollama.embedding.options.num-thread=8
spring.ai.ollama.embedding.options.num-gpu=999
spring.ai.ollama.embedding.options.main-gpu=1

spring.ai.similarity-threshold=0.75

spring.ai.vectorstore.pgvector.initialize-schema=false

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

jira.api.auth.callback.uri=${CALLBACK_HOST}
atlassian.oauth.token-uri=https://auth.atlassian.com

solesonic.llm.intent.model=qwen3:0.6b

spring.ai.mcp.client.enabled=true
